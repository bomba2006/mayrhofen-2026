<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayrhofen 2026 — Trail Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#0f0f1a;color:#d0d0d0}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
/* Sidebar */
.sidebar{position:absolute;top:0;left:0;z-index:1000;width:280px;height:100%;background:rgba(12,12,24,.96);border-right:1px solid #1e1e3a;display:flex;flex-direction:column;transition:transform .25s}
.sidebar.hidden{transform:translateX(-280px)}
.sidebar-header{padding:1rem;border-bottom:1px solid #1e1e3a}
.sidebar-header h2{font-size:.95rem;color:#e0793a;margin-bottom:.15rem}
.sidebar-header .sub{font-size:.65rem;color:#666}
/* Filter tabs */
.filters{display:flex;padding:.5rem;gap:.25rem;border-bottom:1px solid #1e1e3a}
.filter-btn{flex:1;padding:.4rem .3rem;border:1px solid #1e1e3a;background:transparent;color:#888;border-radius:5px;cursor:pointer;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;transition:all .15s}
.filter-btn:hover{color:#ccc}
.filter-btn.active{background:#e0793a15;color:#e0793a;border-color:#e0793a44}
/* Route list */
.route-list{flex:1;overflow-y:auto;padding:.5rem}
.route-card{padding:.6rem;margin:.25rem 0;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.route-card:hover{background:rgba(255,255,255,.03);border-color:#2a2a44}
.route-card.selected{background:#e0793a10;border-color:#e0793a44}
.route-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.2rem}
.route-card .name{font-size:.72rem;font-weight:600;color:#ddd}
.route-card .badge{font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0}
.route-card .stats{font-size:.62rem;color:#777}
.route-card .meta{display:flex;gap:.5rem;margin-top:.2rem;font-size:.6rem;color:#666}
.route-card .meta span{display:flex;align-items:center;gap:.15rem}
.badge.t1{background:#e0793a22;color:#e0793a}.badge.t2{background:#4a90d922;color:#4a90d9}
.badge.st{background:#d4851f22;color:#d4851f}.badge.dv{background:#8b5cf622;color:#8b5cf6}
/* Detail panel */
.detail-panel{position:absolute;bottom:0;left:280px;right:0;z-index:1000;background:rgba(12,12,24,.96);border-top:1px solid #1e1e3a;padding:1rem;transform:translateY(100%);transition:transform .3s;max-height:45vh;overflow-y:auto}
.detail-panel.open{transform:translateY(0)}
.detail-panel.shifted{left:0}
.detail-panel h3{font-size:.9rem;color:#e0793a;margin-bottom:.3rem}
.detail-panel .stat-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin:.5rem 0}
.detail-panel .stat{text-align:center}
.detail-panel .stat .val{font-size:1.1rem;font-weight:700;color:#ddd}
.detail-panel .stat .lbl{font-size:.6rem;color:#888;text-transform:uppercase}
.detail-panel .hut{font-size:.7rem;color:#2e8b57;margin:.3rem 0}
.detail-panel .close-btn{position:absolute;top:.5rem;right:.75rem;background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer}
.close-btn:hover{color:#fff}
/* Elevation chart */
.elev-chart{width:100%;height:100px;margin:.5rem 0;background:#111;border-radius:6px;position:relative;overflow:hidden}
.elev-chart canvas{width:100%;height:100%}
/* Toggle */
.toggle-btn{position:absolute;top:10px;left:290px;z-index:1001;background:rgba(12,12,24,.9);border:1px solid #1e1e3a;color:#e0793a;padding:6px 8px;border-radius:0 6px 6px 0;cursor:pointer;font-size:.8rem;transition:left .25s}
.toggle-btn.shifted{left:10px}
/* Map popup overrides */
.leaflet-popup-content-wrapper{background:#12121f;color:#ddd;border:1px solid #2a2a44;border-radius:8px}
.leaflet-popup-tip{background:#12121f}
.leaflet-popup-content{font-size:.7rem;margin:8px 12px}
.leaflet-popup-content b{color:#e0793a}
@media(max-width:640px){.sidebar{width:240px}.detail-panel{left:240px}.toggle-btn{left:250px}}
</style>
</head>
<body>
<div id="map"></div>
<button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">◀</button>

<div class="sidebar" id="sidebar">
<div class="sidebar-header"><h2>Mayrhofen 2026</h2><div class="sub">12 routes · 6 drives · 3 adults · ☕🥮 daily</div></div>
<div class="filters">
<button class="filter-btn active" onclick="filterRoutes('all',this)">All</button>
<button class="filter-btn" onclick="filterRoutes('t1',this)">T1</button>
<button class="filter-btn" onclick="filterRoutes('t2',this)">T2</button>
<button class="filter-btn" onclick="filterRoutes('st',this)">Stretch</button>
<button class="filter-btn" onclick="filterRoutes('dv',this)">Drive</button>
</div>
<div class="route-list" id="routeList"></div>
</div>

<div class="detail-panel" id="detailPanel">
<button class="close-btn" onclick="closeDetail()">×</button>
<div id="detailContent"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map',{zoomControl:true,attributionControl:false}).setView([47.10,11.80],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

const C={t1:'#e0793a',t2:'#4a90d9',st:'#d4851f',dv:'#8b5cf6',hut:'#2e8b57',wfall:'#06b6d4',ice:'#94a3b8',summit:'#ef4444'};

const allData = [
  {id:'penken',name:'Penken Panorama',tier:'t1',km:8.7,gain:300,mpk:35,time:'2.5-3h',hut:'Grillhofalm',hutAlt:1800,coords:[[47.163,11.830],[47.167,11.828],[47.170,11.835],[47.165,11.838],[47.163,11.830]],color:C.t1,desc:'360° circular trail at altitude. Lift-accessed. Gentle. Coffee + kaiserschmarrn at Grillhofalm.',elev:[1800,1850,1950,2080,1950,1850,1800]},
  {id:'ahornwalk',name:'Ahorn High Walk',tier:'t1',km:8,gain:400,mpk:50,time:'3-4h',hut:'Edelhütte',hutAlt:2238,coords:[[47.155,11.842],[47.152,11.840],[47.150,11.838],[47.155,11.843],[47.155,11.842]],color:C.t1,desc:'Ahornbahn to Edelhütte loop. High alpine without summit push. Strudel at 2,238m with Ahornspitze views.',elev:[1978,2050,2180,2238,2180,2050,1978]},
  {id:'stillup',name:'Stilluptal Waterfall',tier:'t1',km:15.3,gain:325,mpk:21,time:'5h',hut:'Stilluppe',hutAlt:1400,coords:[[47.128,11.854],[47.130,11.858],[47.135,11.868],[47.142,11.878],[47.128,11.854]],color:C.t1,desc:'Flattest hike. Valley of waterfalls. Wooden boardwalks. Works in light rain — falls are more dramatic.',elev:[1100,1150,1250,1400,1350,1250,1100]},
  {id:'filz',name:'Filzenkogel',tier:'t2',km:7,gain:350,mpk:50,time:'2-3h',hut:'Ahornhütte',hutAlt:2000,coords:[[47.155,11.842],[47.150,11.838],[47.153,11.840],[47.150,11.838],[47.155,11.842]],color:C.t2,desc:'Short summit from Ahornbahn. Quick reward. Good spacer day between bigger hikes.',elev:[1978,2100,2200,2330,2200,2100,1978]},
  {id:'berliner',name:'Berliner Hütte',tier:'t2',km:18.3,gain:854,mpk:47,time:'6.5-7h',hut:'Berliner Hütte',hutAlt:2042,coords:[[47.042,11.775],[47.038,11.770],[47.033,11.762],[47.028,11.758],[47.042,11.775]],color:C.t2,desc:'Gradual valley approach. Historic DAV hut. Wildflowers. Coffee and cake earned by the zigzag climb.',elev:[1200,1350,1600,1850,2042,1850,1600,1350,1200]},
  {id:'wolf',name:'Wolfsklamm Gorge',tier:'t2',km:3,gain:200,mpk:'stairs',time:'1.5-2h',hut:'Stans café',hutAlt:900,coords:[[47.369,11.718],[47.370,11.720],[47.372,11.722],[47.369,11.718]],color:C.t2,dash:'5,5',desc:'350 wooden steps. Waterfalls. "One of the Alps\' most beautiful gorges." €6. 30min drive.',elev:[850,900,1000,950,850]},
  {id:'penkenridge',name:'Penken Ridge Extension',tier:'t2',km:12,gain:450,mpk:38,time:'3.5-4.5h',hut:'Grillhofalm',hutAlt:1800,coords:[[47.163,11.830],[47.167,11.828],[47.172,11.825],[47.178,11.830],[47.163,11.830]],color:C.t2,desc:'Extended ridge walk linking Panorama trail + Wanglspitze. Very gradual. Long day, low strain.',elev:[1800,1850,1950,2080,2150,2080,1950,1850,1800]},
  {id:'olperer',name:'Olpererhütte Full Loop',tier:'st',km:13.8,gain:876,mpk:63,time:'5.5h',hut:'Olpererhütte',hutAlt:2389,coords:[[47.020,11.708],[47.018,11.702],[47.012,11.695],[47.008,11.692],[47.015,11.698],[47.020,11.708]],color:C.st,dash:'8,4',desc:'#1 Zillertal hike (4.8★, 1,674+ reviews). Suspension bridge. Turquoise reservoir. Gain spread over 14km.',elev:[1800,1950,2100,2250,2389,2250,2100,1950,1800]},
  {id:'ahornspitze',name:'Ahornspitze Summit',tier:'st',km:12.4,gain:1000,mpk:81,time:'6-6.5h',hut:'Edelhütte',hutAlt:2238,coords:[[47.155,11.842],[47.150,11.838],[47.149,11.845],[47.147,11.850],[47.149,11.845],[47.150,11.838],[47.155,11.842]],color:C.st,dash:'4,4',desc:'2,973m summit. 4.7★. THE Zillertal peak. Exposed ridge. Clear weather only. Lift to 1,978m start.',elev:[1978,2100,2238,2500,2750,2973,2750,2500,2238,1978]},
  {id:'zhighroad',name:'Zillertal High Road',tier:'dv',km:50,gain:'drive',mpk:'—',time:'2-3h',hut:'Road huts',desc:'One of Austria\'s most beautiful alpine roads. €10 toll. 2,020m max. 5 entry points.',coords:[[47.283,11.876],[47.260,11.840],[47.240,11.810],[47.200,11.790],[47.180,11.830]],color:C.dv,dash:'10,6'},
  {id:'gerlos',name:'Gerlos Pass → Krimml',tier:'dv',km:12,gain:'drive',mpk:'—',time:'30min',hut:'Krimml café',desc:'Mountain pass to Krimml Waterfalls. €12 toll. Use as transit, not destination.',coords:[[47.200,11.880],[47.230,12.060],[47.240,12.110],[47.228,12.172]],color:C.dv,dash:'8,5'},
  {id:'schlegeisrd',name:'Schlegeis Toll Road',tier:'dv',km:8,gain:'drive',mpk:'—',time:'20min',hut:'—',desc:'Winding road to reservoir at 1,800m. €18 toll. Dramatic dam. Trailhead for Olpererhütte.',coords:[[47.055,11.802],[47.040,11.750],[47.030,11.725],[47.020,11.708]],color:C.dv,dash:'6,4'},
];

const pois = [
  {name:'Mayrhofen',coord:[47.167,11.867],color:C.t1,desc:'Base · 633m'},
  {name:'Penkenbahn top',coord:[47.163,11.830],color:C.t1,desc:'1,800m'},
  {name:'Ahornbahn top',coord:[47.155,11.842],color:C.t1,desc:'1,978m'},
  {name:'Grillhofalm',coord:[47.163,11.835],color:C.hut,desc:'🥮 Kaiserschmarrn · Penken'},
  {name:'Edelhütte',coord:[47.150,11.838],color:C.hut,desc:'🥮 Strudel · 2,238m'},
  {name:'Olpererhütte',coord:[47.008,11.692],color:C.hut,desc:'🥮 Bridge · 2,389m'},
  {name:'Berliner Hütte',coord:[47.028,11.758],color:C.hut,desc:'🥮 2,042m · Historic'},
  {name:'Tuxer Fernerhaus',coord:[47.007,11.683],color:C.hut,desc:'🥮 Glacier strudel'},
  {name:'Stilluppe',coord:[47.128,11.854],color:C.hut,desc:'🥮 Valley rest stop'},
  {name:'Krimml Falls',coord:[47.228,12.172],color:C.wfall,desc:'💧 385m · #1 Europe'},
  {name:'Hintertux Glacier',coord:[47.005,11.685],color:C.ice,desc:'❄️ 3,250m · Year-round'},
  {name:'Wolfsklamm',coord:[47.369,11.718],color:C.t2,desc:'🪜 350 steps · €6'},
  {name:'Filzenkogel',coord:[47.153,11.840],color:C.t2,desc:'🏔️ Summit'},
  {name:'Ahornspitze',coord:[47.147,11.850],color:C.summit,desc:'🏔️ 2,973m'},
  {name:'Schlegeis',coord:[47.020,11.708],color:C.t1,desc:'🚗 Reservoir · 1,800m'},
];

const layers={};

// Render POIs
pois.forEach(p=>{
  const icon=L.divIcon({html:`<div style="background:${p.color};width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,.6)"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
  const m=L.marker(p.coord,{icon}).bindPopup(`<b>${p.name}</b><br><span style="font-size:.65rem;color:#888">${p.desc}</span>`);
  layers['poi_'+p.name]=m; m.addTo(map);
});

// Render routes
allData.filter(d=>d.tier!=='poi').forEach((d,i)=>{
  const opts={color:d.color,weight:d.tier==='st'?2:3,opacity:d.tier==='dv'?.5:.8};
  if(d.dash) opts.dashArray=d.dash;
  const line=L.polyline(d.coords,opts);
  line.bindPopup(`<b>${d.name}</b><br><span style="font-size:.65rem;color:#888">${d.km}km · ${d.gain}m · ${d.mpk}m/km</span>`);
  line.on('click',()=>showDetail(d));
  layers['route_'+d.id]=line; line.addTo(map);
});

// Route cards
const routeList=document.getElementById('routeList');
let currentFilter='all',selectedId=null;

function renderCards(filter){
  routeList.innerHTML='';
  const filtered = filter==='all' ? allData : allData.filter(d=>d.tier===filter);
  filtered.forEach(d=>{
    const card=document.createElement('div');
    card.className='route-card'+(d.id===selectedId?' selected':'');
    const badgeClass=d.tier==='t1'?'t1':d.tier==='t2'?'t2':d.tier==='st'?'st':'dv';
    const badgeLabel=d.tier==='t1'?'T1':d.tier==='t2'?'T2':d.tier==='st'?'STR':'DRV';
    card.innerHTML=`<div class="top"><span class="name">${d.name}</span><span class="badge ${badgeClass}">${badgeLabel}</span></div>
      <div class="stats">${d.km}km · ${typeof d.gain==='number'?d.gain+'m · ':''}${d.mpk}m/km · ${d.time}</div>
      <div class="meta">${d.hut?`<span>🥮 ${d.hut}</span>`:''}${d.hutAlt?`<span>📏 ${d.hutAlt}m</span>`:''}</div>`;
    card.onclick=()=>{selectedId=d.id;renderCards(currentFilter);showDetail(d);map.fitBounds(L.polyline(d.coords).getBounds(),{padding:[60,60],maxZoom:14});};
    routeList.appendChild(card);
  });
}
renderCards('all');

window.filterRoutes=(tier,btn)=>{
  currentFilter=tier;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(tier);
};

// Detail panel
function showDetail(d){
  const panel=document.getElementById('detailPanel');
  const content=document.getElementById('detailContent');
  const isDrive=d.tier==='dv';
  content.innerHTML=`
    <h3>${d.name}</h3>
    <div class="stat-row">
      <div class="stat"><div class="val">${d.km}${isDrive?'':'km'}</div><div class="lbl">Distance</div></div>
      ${typeof d.gain==='number'?`<div class="stat"><div class="val">${d.gain}m</div><div class="lbl">Gain</div></div>`:''}
      <div class="stat"><div class="val">${d.mpk}${isDrive?'':'m/km'}</div><div class="lbl">${isDrive?'Type':'Steepness'}</div></div>
      <div class="stat"><div class="val">${d.time}</div><div class="lbl">Time</div></div>
    </div>
    <p style="font-size:.7rem;color:#999;line-height:1.5">${d.desc}</p>
    ${d.hut?`<div class="hut">☕🥮 Strudel stop: ${d.hut}${d.hutAlt?` (${d.hutAlt}m)`:''}</div>`:''}
    ${d.elev?`<div class="elev-chart"><canvas id="elevCanvas"></canvas></div>`:''}
  `;
  panel.classList.add('open');
  if(document.getElementById('sidebar').classList.contains('hidden')){
    panel.classList.add('shifted');
  }else{panel.classList.remove('shifted')}
  if(d.elev) setTimeout(()=>drawElevation(d),100);
}

window.closeDetail=()=>{
  document.getElementById('detailPanel').classList.remove('open');
  selectedId=null; renderCards(currentFilter);
};

function drawElevation(d){
  const canvas=document.getElementById('elevCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const w=canvas.parentElement.clientWidth;
  const h=100;
  canvas.width=w;canvas.height=h;
  const data=d.elev;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const padding=10;
  ctx.strokeStyle=d.color;ctx.lineWidth=2;ctx.beginPath();
  data.forEach((v,i)=>{
    const x=padding+(i/(data.length-1))*(w-2*padding);
    const y=h-padding-((v-min)/range)*(h-2*padding);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Fill
  ctx.lineTo(w-padding,h-padding);ctx.lineTo(padding,h-padding);ctx.closePath();
  ctx.fillStyle=d.color+'15';ctx.fill();
  // Labels
  ctx.fillStyle='#888';ctx.font='9px system-ui';
  ctx.fillText(min+'m',2,h-2);
  ctx.fillText(max+'m',2,14);
}

// Sidebar toggle
let sbOpen=true;
window.toggleSidebar=()=>{
  sbOpen=!sbOpen;
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('toggleBtn');
  const panel=document.getElementById('detailPanel');
  sb.classList.toggle('hidden',!sbOpen);
  btn.classList.toggle('shifted',!sbOpen);
  btn.textContent=sbOpen?'◀':'▶';
  if(panel.classList.contains('open')){
    panel.classList.toggle('shifted',!sbOpen);
  }
  setTimeout(()=>map.invalidateSize(),250);
};

// Fit all
const allPts=[...allData.flatMap(d=>d.coords),...pois.map(p=>p.coord)];
map.fitBounds(L.latLngBounds(allPts),{padding:[30,30],maxZoom:12});
</script>
</body>
</html>
