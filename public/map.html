<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerlos 2026 — Trail Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column}
#topbar{background:#161b22;border-bottom:1px solid #21262d;padding:.6rem 1rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
#topbar a{color:#8b949e;text-decoration:none;font-size:.78rem;padding:.3rem .6rem;border-radius:4px;border:1px solid #21262d;transition:all .15s}
#topbar a:hover{color:#f0f6fc;border-color:#58a6ff}
#topbar a.home{color:#58a6ff;font-weight:600}
#topbar .title{font-size:.95rem;font-weight:700;color:#f0f6fc}
#filters{display:flex;gap:.4rem;margin-left:auto;flex-wrap:wrap}
.filt-btn{padding:.25rem .6rem;border-radius:12px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#0d1117;color:#8b949e;transition:all .15s}
.filt-btn.active{color:#fff}
.filt-btn.t0.active{background:#a371f733;border-color:#a371f7;color:#a371f7}
.filt-btn.t1.active{background:#2ea04333;border-color:#2ea043;color:#2ea043}
.filt-btn.t2.active{background:#d2991d33;border-color:#d2991d;color:#d2991d}
.filt-btn.poi.active{background:#58a6ff33;border-color:#58a6ff;color:#58a6ff}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:340px;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;flex-shrink:0}
#map{flex:1}
.side-item{padding:.75rem 1rem;border-bottom:1px solid #21262d1a;cursor:pointer;transition:background .15s}
.side-item:hover{background:#21262d33}
.side-item .name{font-size:.85rem;font-weight:600;color:#f0f6fc}
.side-item .stats{font-size:.72rem;color:#8b949e;margin-top:.2rem}
.side-item .tier{display:inline-block;padding:.1rem .4rem;border-radius:8px;font-size:.65rem;font-weight:700;margin-bottom:.3rem}
.tier.t0{background:#a371f722;color:#a371f7}
.tier.t1{background:#2ea04322;color:#2ea043}
.tier.t2{background:#d2991d22;color:#d2991d}
.tier.poi{background:#58a6ff22;color:#58a6ff}
.leaflet-popup-content{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:.82rem;color:#0d1117}
.leaflet-popup-content strong{display:block;margin-bottom:.2rem}
.leaflet-popup-content .pop-stats{font-size:.72rem;color:#484f58}
.leaflet-popup-content a{color:#58a6ff;display:inline-block;margin-top:.4rem}
.mobile-toggle{display:none;position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:1000;background:#161b22;border:1px solid #30363d;color:#f0f6fc;padding:.6rem 1.2rem;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer}
@media(max-width:640px){
  #sidebar{position:fixed;left:-100%;top:64px;bottom:0;z-index:999;width:100%;max-width:340px;transition:left .3s}
  #sidebar.open{left:0}
  .mobile-toggle{display:block}
  #topbar{gap:.4rem;padding:.5rem .6rem}
  #topbar .title{font-size:.8rem}
}
</style>
</head>
<body>
<div id="topbar">
  <a href="index.html" class="home">← Hub</a>
  <a href="report.html">📋 Report</a>
  <a href="companion.html">📱 Companion</a>
  <span class="title">🗺️ Trail Map</span>
  <div id="filters">
    <button class="filt-btn t0 active" onclick="toggleFilter('t0',this)">Can't Miss</button>
    <button class="filt-btn t1 active" onclick="toggleFilter('t1',this)">Essential</button>
    <button class="filt-btn t2 active" onclick="toggleFilter('t2',this)">Alternatives</button>
    <button class="filt-btn poi active" onclick="toggleFilter('poi',this)">POIs</button>
  </div>
</div>
<div id="main">
<div id="sidebar"></div>
<div id="map"></div>
</div>
<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">📋 Trail List</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([47.20, 11.95], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom: 18
}).addTo(map);

const markers = [];
const data = [
  // Tier 0
  {tier:'t0',name:'Isskogel → Kreuzjoch',lat:47.244,lng:12.030,desc:'5–19 km · 39 m/km · FREE lift · 2.5–7h',link:'https://www.google.com/maps/dir/?api=1&destination=47.2440,12.0300',icon:'star'},
  {tier:'t0',name:'Olpererhütte Full',lat:47.005,lng:11.705,desc:'13.8 km · 63 m/km · 876m · #1 rated',link:'https://www.google.com/maps/dir/?api=1&destination=47.0050,11.7050',icon:'mountain'},
  {tier:'t0',name:'Penken Panorama',lat:47.168,lng:11.864,desc:'8.7 km · 35 m/km · Penkenbahn ~€28',link:'https://www.google.com/maps/dir/?api=1&destination=47.1680,11.8640',icon:'cablecar'},
  {tier:'t0',name:'Krimml Waterfalls',lat:47.219,lng:12.171,desc:'~4 km boardwalk · 15 min from Gerlos · 4.6★',link:'https://www.google.com/maps/dir/?api=1&destination=47.2190,12.1710',icon:'waterfall'},
  // Tier 1
  {tier:'t1',name:'Durlaßboden Extended',lat:47.242,lng:12.082,desc:'21.4 km · 16 m/km · 5.0★ · flat recovery',link:'https://www.google.com/maps/dir/?api=1&destination=47.2420,12.0820',icon:'lake'},
  {tier:'t1',name:'Wimmertal Valley',lat:47.240,lng:12.045,desc:'11.1 km · 18 m/km · most unspoiled valley',link:'https://www.google.com/maps/dir/?api=1&destination=47.2400,12.0450',icon:'valley'},
  {tier:'t1',name:'Hohe Tauern Panorama ET02',lat:47.238,lng:12.090,desc:'19.5 km · 34 m/km · 30+ three-thousander views',link:'https://www.google.com/maps/dir/?api=1&destination=47.2420,12.0820',icon:'panorama'},
  {tier:'t1',name:'Durlaßboden Circular',lat:47.242,lng:12.082,desc:'10.6 km · 23 m/km · 4.5★ · boat rental',link:'https://www.google.com/maps/dir/?api=1&destination=47.2420,12.0820',icon:'lake'},
  // Tier 2
  {tier:'t2',name:'Filzenkogel (hidden gem)',lat:47.176,lng:11.860,desc:'6.3 km · 59 m/km · 4.7★ · blog-endorsed',link:'https://www.google.com/maps/dir/?api=1&destination=47.1680,11.8640',icon:'peak'},
  {tier:'t2',name:'Berliner Hütte',lat:47.025,lng:11.810,desc:'18.3 km · 47 m/km · 4.7★ · Reddit: exposed',link:'https://www.google.com/maps/dir/?api=1&destination=47.1680,11.8640',icon:'hut'},
  {tier:'t2',name:'Gerlosstein',lat:47.220,lng:11.900,desc:'5.6 km · with lift · 4.7★ · Arena views',link:'https://www.google.com/maps/dir/?api=1&destination=47.2200,11.9000',icon:'peak'},
  // POIs
  {tier:'poi',name:'🏠 Bergleben Deluxe',lat:47.2475,lng:12.028,desc:'Base · Private sauna · Free Mountain Card',link:'https://www.google.com/maps/dir/?api=1&destination=47.2475,12.0280',icon:'home'},
  {tier:'poi',name:'🚡 Isskogelbahn (FREE)',lat:47.244,lng:12.030,desc:'1,300→1,900m · Free Mountain Card',link:'https://www.google.com/maps/dir/?api=1&destination=47.2440,12.0300',icon:'lift'},
  {tier:'poi',name:'🚡 Dorfbahn Königsleiten (FREE)',lat:47.250,lng:12.130,desc:'1,600→2,200m · Free Mountain Card',link:'https://www.google.com/maps/dir/?api=1&destination=47.2500,12.1300',icon:'lift'},
  {tier:'poi',name:'🛒 SPAR Gerlos',lat:47.244,lng:12.030,desc:'Main supermarket · closed Sunday',link:'https://www.google.com/maps/dir/?api=1&destination=47.2440,12.0300',icon:'shop'},
  {tier:'poi',name:'🍽️ Goldkind (vegan)',lat:47.167,lng:11.862,desc:'4.8★ · 442 reviews · Mayrhofen',link:'https://www.google.com/maps/dir/?api=1&destination=47.1670,11.8620',icon:'restaurant'},
  {tier:'poi',name:'🍽️ Dahuam.202',lat:47.243,lng:12.025,desc:'Vegan bowl+burger · closed Thu',link:'https://www.google.com/maps/dir/?api=1&destination=47.2430,12.0250',icon:'restaurant'},
  {tier:'poi',name:'🚡 Penkenbahn',lat:47.168,lng:11.864,desc:'~€28 · Mayrhofen gondola',link:'https://www.google.com/maps/dir/?api=1&destination=47.1680,11.8640',icon:'lift'},
];

const iconMap = {
  star:'⭐',mountain:'⛰️',cablecar:'🚡',waterfall:'💧',lake:'💧',valley:'🌿',panorama:'🏔️',peak:'🔺',hut:'🏚️',
  home:'🏠',lift:'🚡',shop:'🛒',restaurant:'🍽️'
};

const activeFilters = {t0:true,t1:true,t2:true,poi:true};

function toggleFilter(tier,btn){
  activeFilters[tier]=!activeFilters[tier];
  btn.classList.toggle('active');
  refreshAll();
}

function refreshAll(){
  markers.forEach(m=>map.removeLayer(m));
  markers.length=0;
  const sidebar=document.getElementById('sidebar');
  sidebar.innerHTML='';
  data.forEach(d=>{
    if(!activeFilters[d.tier])return;
    const m=L.marker([d.lat,d.lng]).addTo(map);
    const popupHTML = `<strong>${d.name}</strong><span class="pop-stats">${d.desc}</span><br><a href="${d.link}" target="_blank">🧭 Navigate →</a>`;
    m.bindPopup(popupHTML);
    markers.push(m);
    const div=document.createElement('div');
    div.className='side-item';
    div.innerHTML=`<span class="tier ${d.tier}">${d.tier==='t0'?'★ Can\'t Miss':d.tier==='t1'?'☆ Essential':d.tier==='t2'?'↻ Alternative':'📍 POI'}</span><div class="name">${d.name}</div><div class="stats">${d.desc}</div>`;
    div.onclick=()=>{map.setView([d.lat,d.lng],15);m.openPopup();document.getElementById('sidebar').classList.remove('open');};
    sidebar.appendChild(div);
  });
}

refreshAll();
</script>
</body>
</html>
