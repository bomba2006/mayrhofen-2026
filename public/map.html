<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayrhofen 2026 — Trail Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}
/* Left panel */
.panel{width:340px;min-width:340px;background:#161b22;border-right:1px solid #21262d;display:flex;flex-direction:column;z-index:10}
.panel-header{padding:1rem 1.25rem;border-bottom:1px solid #21262d}
.panel-header h2{font-size:1rem;color:#f0f6fc}
.panel-header .sub{font-size:.68rem;color:#8b949e;margin-top:.15rem}
.panel-header a{color:#58a6ff;text-decoration:none;font-size:.7rem}
.filters{display:flex;padding:.6rem .75rem;gap:.3rem;border-bottom:1px solid #21262d}
.fbtn{flex:1;padding:.35rem .2rem;border:1px solid #21262d;background:transparent;color:#8b949e;border-radius:5px;cursor:pointer;font-size:.65rem;font-weight:700;text-transform:uppercase;transition:all .15s}
.fbtn:hover{color:#ddd;border-color:#30363d}
.fbtn.active{background:#58a6ff15;color:#58a6ff;border-color:#58a6ff44}
.route-list{flex:1;overflow-y:auto;padding:.5rem}
.route-card{padding:.7rem;margin:.2rem 0;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.route-card:hover{background:#ffffff04;border-color:#30363d}
.route-card.selected{background:#58a6ff0a;border-color:#58a6ff33}
.route-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.2rem}
.route-card .name{font-size:.78rem;font-weight:600;color:#e6edf3}
.route-card .badge{font-size:.58rem;padding:1px 6px;border-radius:3px;font-weight:700}
.badge.t1{background:#2ea04322;color:#2ea043}.badge.t2{background:#58a6ff22;color:#58a6ff}
.badge.st{background:#d2991d22;color:#d2991d}.badge.dv{background:#a371f722;color:#a371f7}
.route-card .stats{font-size:.65rem;color:#8b949e}
.route-card .meta{display:flex;gap:.5rem;margin-top:.2rem;font-size:.63rem;color:#484f58}
/* Right map */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
/* Detail drawer */
.drawer{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:#161b22ee;backdrop-filter:blur(10px);border-top:1px solid #30363d;padding:1.25rem;transform:translateY(100%);transition:transform .3s;max-height:42vh;overflow-y:auto}
.drawer.open{transform:translateY(0)}
.drawer h3{font-size:1rem;color:#f0f6fc;margin-bottom:.5rem}
.drawer .stat-row{display:flex;gap:1.25rem;flex-wrap:wrap;margin:.5rem 0}
.drawer .stat{text-align:center}
.drawer .stat .val{font-size:1.05rem;font-weight:700;color:#f0f6fc}
.drawer .stat .lbl{font-size:.62rem;color:#8b949e;text-transform:uppercase;letter-spacing:.04em}
.drawer p{font-size:.75rem;color:#8b949e;line-height:1.5;margin:.5rem 0}
.drawer .hut{font-size:.72rem;color:#2ea043;margin:.3rem 0}
.drawer .elev-chart{width:100%;height:90px;margin:.5rem 0;background:#0d1117;border-radius:6px}
.drawer .close-btn{position:absolute;top:.5rem;right:.75rem;background:none;border:none;color:#8b949e;font-size:1.3rem;cursor:pointer}
.drawer .close-btn:hover{color:#fff}
.gmaps-btn-sm{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .75rem;background:#0d1117;border:1px solid #30363d;border-radius:5px;color:#58a6ff;text-decoration:none;font-size:.7rem;font-weight:600;margin:.3rem .3rem .3rem 0}
.gmaps-btn-sm:hover{border-color:#58a6ff}
/* Mobile toggle */
.toggle-btn{display:none;position:absolute;top:.75rem;left:.75rem;z-index:1001;background:#161b22;border:1px solid #30363d;color:#f0f6fc;padding:.5rem .7rem;border-radius:6px;cursor:pointer;font-size:.8rem}
@media(max-width:740px){
  .panel{position:absolute;left:0;top:0;height:100%;z-index:100;transform:translateX(-100%);transition:transform .25s;width:300px;min-width:300px}
  .panel.show{transform:translateX(0)}
  .toggle-btn{display:block}
  .drawer{left:0}
}
</style>
</head>
<body>
<div id="app">
  <div class="panel" id="panel">
    <div class="panel-header">
      <h2>🗺️ Mayrhofen 2026</h2>
      <div class="sub">12 routes · 6 drives · 14 POIs · <a href="index.html">← Hub</a> · <a href="report.html">Dossier</a></div>
    </div>
    <div class="filters">
      <button class="fbtn active" onclick="filterRoutes('all',this)">All</button>
      <button class="fbtn" onclick="filterRoutes('t1',this)">T1</button>
      <button class="fbtn" onclick="filterRoutes('t2',this)">T2</button>
      <button class="fbtn" onclick="filterRoutes('st',this)">Str</button>
      <button class="fbtn" onclick="filterRoutes('dv',this)">Drv</button>
    </div>
    <div class="route-list" id="routeList"></div>
  </div>
  <div class="map-wrap">
    <button class="toggle-btn" id="toggleBtn" onclick="togglePanel()">☰ Routes</button>
    <div id="map"></div>
    <div class="drawer" id="drawer">
      <button class="close-btn" onclick="closeDrawer()">×</button>
      <div id="drawerContent"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const C={t1:'#2ea043',t2:'#58a6ff',st:'#d2991d',dv:'#a371f7',hut:'#2ea043',wfall:'#06b6d4',ice:'#94a3b8',summit:'#ef4444'};

const allData=[
  {id:'penken',name:'Penken Panorama',tier:'t1',km:8.7,gain:300,mpk:35,time:'2.5-3h',hut:'Grillhofalm',hutAlt:1800,coords:[[47.163,11.830],[47.167,11.828],[47.170,11.835],[47.165,11.838],[47.163,11.830]],color:C.t1,desc:'360° circular trail at altitude. Lift-accessed. Gentle. Coffee + kaiserschmarrn at Grillhofalm.',elev:[1800,1850,1950,2080,1950,1850,1800],trailhead:[47.167,11.864],gmaps:'47.167,11.864'},
  {id:'ahornwalk',name:'Ahorn High Walk',tier:'t1',km:8,gain:400,mpk:50,time:'3-4h',hut:'Edelhütte',hutAlt:2238,coords:[[47.155,11.842],[47.152,11.840],[47.150,11.838],[47.155,11.843],[47.155,11.842]],color:C.t1,desc:'Ahornbahn to Edelhütte loop. High alpine without summit push. Strudel at 2,238m.',elev:[1978,2050,2180,2238,2180,2050,1978],trailhead:[47.167,11.864],gmaps:'47.167,11.864'},
  {id:'stillup',name:'Stilluptal Waterfall',tier:'t1',km:15.3,gain:325,mpk:21,time:'5h',hut:'Stilluppe',hutAlt:1400,coords:[[47.128,11.854],[47.130,11.858],[47.135,11.868],[47.142,11.878]],color:C.t1,desc:'Flattest hike. Valley of waterfalls. Wooden boardwalks. Works in light rain.',elev:[1100,1150,1250,1400,1350,1250,1100],trailhead:[47.128,11.854],gmaps:'47.128,11.854'},
  {id:'filz',name:'Filzenkogel',tier:'t2',km:7,gain:350,mpk:50,time:'2-3h',hut:'Ahornhütte',hutAlt:2000,coords:[[47.155,11.842],[47.150,11.838],[47.153,11.840],[47.150,11.838],[47.155,11.842]],color:C.t2,desc:'Short summit from Ahornbahn. Quick reward. Good spacer day.',elev:[1978,2100,2200,2330,2200,2100,1978],trailhead:[47.167,11.864],gmaps:'47.167,11.864'},
  {id:'berliner',name:'Berliner Hütte',tier:'t2',km:18.3,gain:854,mpk:47,time:'6.5-7h',hut:'Berliner Hütte',hutAlt:2042,coords:[[47.042,11.775],[47.038,11.770],[47.033,11.762],[47.028,11.758]],color:C.t2,desc:'Gradual valley approach. Historic DAV hut. Wildflowers. Coffee and cake earned by the climb.',elev:[1200,1350,1600,1850,2042,1850,1600,1350,1200],trailhead:[47.042,11.775],gmaps:'47.042,11.775'},
  {id:'wolf',name:'Wolfsklamm Gorge',tier:'t2',km:3,gain:200,mpk:'stairs',time:'1.5-2h',hut:'Stans café',hutAlt:900,coords:[[47.369,11.718],[47.370,11.720],[47.372,11.722]],color:C.t2,dash:'5,5',desc:'350 wooden steps. Waterfalls. €6. 30min drive from Mayrhofen.',elev:[850,900,1000,950,850],trailhead:[47.369,11.718],gmaps:'47.369,11.718'},
  {id:'penkenridge',name:'Penken Ridge Extended',tier:'t2',km:12,gain:450,mpk:38,time:'3.5-4.5h',hut:'Grillhofalm',hutAlt:1800,coords:[[47.163,11.830],[47.167,11.828],[47.172,11.825],[47.178,11.830]],color:C.t2,desc:'Extended ridge walk linking Panorama trail + Wanglspitze. Very gradual. Long day, low strain.',elev:[1800,1850,1950,2080,2150,2080,1950,1850,1800],trailhead:[47.167,11.864],gmaps:'47.167,11.864'},
  {id:'olperer',name:'Olpererhütte Full',tier:'st',km:13.8,gain:876,mpk:63,time:'5.5h',hut:'Olpererhütte',hutAlt:2389,coords:[[47.020,11.708],[47.018,11.702],[47.012,11.695],[47.008,11.692],[47.015,11.698],[47.020,11.708]],color:C.st,dash:'8,4',desc:'#1 Zillertal hike (4.8★, 1,674+). Suspension bridge. Turquoise reservoir. Gain spread over 14km.',elev:[1800,1950,2100,2250,2389,2250,2100,1950,1800],trailhead:[47.020,11.708],gmaps:'47.020,11.708'},
  {id:'olperershort',name:'Olpererhütte Short',tier:'st',km:6.4,gain:600,mpk:94,time:'3-4h',hut:'Olpererhütte',hutAlt:2389,coords:[[47.020,11.708],[47.015,11.698],[47.008,11.692]],color:C.st,dash:'4,4',desc:'Efficient version: bridge only. Steep (94 m/km) but quick. Same iconic view.',elev:[1800,2100,2389,2100,1800],trailhead:[47.020,11.708],gmaps:'47.020,11.708'},
  {id:'ahornspitze',name:'Ahornspitze Summit',tier:'st',km:12.4,gain:1000,mpk:81,time:'6-6.5h',hut:'Edelhütte',hutAlt:2238,coords:[[47.155,11.842],[47.150,11.838],[47.149,11.845],[47.147,11.850]],color:C.st,dash:'4,4',desc:'2,973m summit. 4.7★. THE Zillertal peak. Exposed ridge. Clear weather only. Lift to 1,978m.',elev:[1978,2100,2238,2500,2750,2973,2750,2500,2238,1978],trailhead:[47.167,11.864],gmaps:'47.167,11.864'},
  {id:'zhighroad',name:'Zillertal High Road',tier:'dv',km:50,gain:'drive',mpk:'—',time:'2-3h',hut:'Road huts',desc:'Austria\'s most beautiful alpine road. €10 toll. 2,020m max.',coords:[[47.283,11.876],[47.260,11.840],[47.240,11.810],[47.200,11.790],[47.180,11.830]],color:C.dv,dash:'10,6',trailhead:[47.283,11.876],gmaps:'47.283,11.876'},
  {id:'gerlos',name:'Gerlos Pass → Krimml',tier:'dv',km:12,gain:'drive',mpk:'—',time:'30min',hut:'Krimml café',desc:'Mountain pass to Krimml (385m falls). €12 toll. Use as transit.',coords:[[47.200,11.880],[47.230,12.060],[47.240,12.110],[47.228,12.172]],color:C.dv,dash:'8,5',trailhead:[47.228,12.172],gmaps:'47.228,12.172'},
  {id:'schlegeisrd',name:'Schlegeis Toll Road',tier:'dv',km:8,gain:'drive',mpk:'—',time:'20min',hut:'—',desc:'Winding road to reservoir 1,800m. €18 toll. Dramatic dam. Olperer trailhead.',coords:[[47.055,11.802],[47.040,11.750],[47.030,11.725],[47.020,11.708]],color:C.dv,dash:'6,4',trailhead:[47.020,11.708],gmaps:'47.020,11.708'},
];
const pois=[
  {name:'Mayrhofen',coord:[47.167,11.867],color:C.t1,desc:'Base · 633m'},
  {name:'Penkenbahn top',coord:[47.163,11.830],color:C.t1,desc:'1,800m'},
  {name:'Ahornbahn top',coord:[47.155,11.842],color:C.t1,desc:'1,978m'},
  {name:'Grillhofalm',coord:[47.163,11.835],color:C.hut,desc:'🥮 Kaiserschmarrn · Penken'},
  {name:'Edelhütte',coord:[47.150,11.838],color:C.hut,desc:'🥮 Strudel · 2,238m'},
  {name:'Olpererhütte',coord:[47.008,11.692],color:C.hut,desc:'🥮 Bridge · 2,389m'},
  {name:'Berliner Hütte',coord:[47.028,11.758],color:C.hut,desc:'🥮 2,042m · Historic'},
  {name:'Tuxer Fernerhaus',coord:[47.007,11.683],color:C.hut,desc:'🥮 Glacier strudel'},
  {name:'Stilluppe',coord:[47.128,11.854],color:C.hut,desc:'🥮 Valley rest stop'},
  {name:'Krimml Falls',coord:[47.228,12.172],color:C.wfall,desc:'💧 385m · #1 Europe'},
  {name:'Hintertux Glacier',coord:[47.005,11.685],color:C.ice,desc:'❄️ 3,250m'},
  {name:'Wolfsklamm',coord:[47.369,11.718],color:C.t2,desc:'🪜 350 steps · €6'},
  {name:'Filzenkogel',coord:[47.153,11.840],color:C.t2,desc:'🏔️ Summit'},
  {name:'Ahornspitze',coord:[47.147,11.850],color:C.summit,desc:'🏔️ 2,973m'},
  {name:'Schlegeis',coord:[47.020,11.708],color:C.t1,desc:'🚗 Reservoir 1,800m'},
  {name:'Kaprun Reservoirs',coord:[47.230,12.720],color:C.t1,desc:'🏔️ Mooserboden 2,040m'},
  {name:'Zell am See',coord:[47.323,12.798],color:C.t2,desc:'☕ Café Seegasse'},
  {name:'Gerlos Pass',coord:[47.223,12.172],color:C.dv,desc:'📸 Photo stop'},
];

const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([47.12,11.82],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

pois.forEach(p=>{
  const icon=L.divIcon({html:`<div style="background:${p.color};width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,.6)"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
  L.marker(p.coord,{icon}).bindPopup(`<b>${p.name}</b><br><span style="font-size:.65rem;color:#888">${p.desc}</span>`).addTo(map);
});

const routeLayers={};
allData.forEach(d=>{
  const opts={color:d.color,weight:d.tier==='st'?2:3,opacity:d.tier==='dv'?.5:.8};
  if(d.dash) opts.dashArray=d.dash;
  const line=L.polyline(d.coords,opts);
  line.bindPopup(`<b>${d.name}</b><br><span style="font-size:.65rem">${d.km}km · ${typeof d.gain==='number'?d.gain+'m · ':''}${d.mpk}m/km</span>`);
  line.on('click',()=>showDrawer(d));
  line.addTo(map);
  routeLayers[d.id]=line;
});

let currentFilter='all',selectedId=null;
function renderCards(filter){
  const list=document.getElementById('routeList');
  list.innerHTML='';
  const filtered=filter==='all'?allData:allData.filter(d=>d.tier===filter);
  filtered.forEach(d=>{
    const card=document.createElement('div');
    card.className='route-card'+(d.id===selectedId?' selected':'');
    const bc=d.tier==='t1'?'t1':d.tier==='t2'?'t2':d.tier==='st'?'st':'dv';
    const bl=d.tier==='t1'?'T1':d.tier==='t2'?'T2':d.tier==='st'?'STR':'DRV';
    card.innerHTML=`<div class="top"><span class="name">${d.name}</span><span class="badge ${bc}">${bl}</span></div>
      <div class="stats">${d.km}km · ${typeof d.gain==='number'?d.gain+'m · ':''}${d.mpk}m/km · ${d.time}</div>
      <div class="meta">${d.hut?`🥮 ${d.hut}`:''}${d.hutAlt?` · ${d.hutAlt}m`:''}</div>`;
    card.onclick=()=>{
      selectedId=d.id;renderCards(currentFilter);showDrawer(d);
      map.fitBounds(L.polyline(d.coords).getBounds(),{padding:[60,60],maxZoom:14});
    };
    list.appendChild(card);
  });
}
renderCards('all');

window.filterRoutes=(tier,btn)=>{
  currentFilter=tier;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(tier);
};

function showDrawer(d){
  const content=document.getElementById('drawerContent');
  const isDrive=d.tier==='dv';
  content.innerHTML=`
    <h3>${d.name}</h3>
    <div class="stat-row">
      <div class="stat"><div class="val">${d.km}${isDrive?'':'km'}</div><div class="lbl">Distance</div></div>
      ${typeof d.gain==='number'?`<div class="stat"><div class="val">${d.gain}m</div><div class="lbl">Gain</div></div>`:''}
      <div class="stat"><div class="val">${d.mpk}${isDrive?'':'m/km'}</div><div class="lbl">${isDrive?'Type':'Steepness'}</div></div>
      <div class="stat"><div class="val">${d.time}</div><div class="lbl">Time</div></div>
    </div>
    <p>${d.desc}</p>
    ${d.hut?`<div class="hut">☕🥮 ${d.hut}${d.hutAlt?` (${d.hutAlt}m)`:''}</div>`:''}
    <a class="gmaps-btn-sm" href="https://www.google.com/maps/dir/?api=1&destination=${d.gmaps}" target="_blank">🗺️ Navigate to trailhead</a>
    ${d.elev?`<div class="elev-chart"><canvas id="elevCanvas"></canvas></div>`:''}
  `;
  document.getElementById('drawer').classList.add('open');
  if(d.elev) setTimeout(()=>drawElevation(d),120);
}

window.closeDrawer=()=>{
  document.getElementById('drawer').classList.remove('open');
  selectedId=null;renderCards(currentFilter);
};

function drawElevation(d){
  const canvas=document.getElementById('elevCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const w=canvas.parentElement.clientWidth;
  canvas.width=w;canvas.height=90;
  const data=d.elev;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pad=10;
  ctx.strokeStyle=d.color;ctx.lineWidth=2;ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad+(i/(data.length-1))*(w-2*pad);
    const y=90-pad-((v-min)/range)*(90-2*pad);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.lineTo(w-pad,90-pad);ctx.lineTo(pad,90-pad);ctx.closePath();
  ctx.fillStyle=d.color+'18';ctx.fill();
  ctx.fillStyle='#8b949e';ctx.font='9px -apple-system,sans-serif';
  ctx.fillText(max+'m',2,14);ctx.fillText(min+'m',2,85);
}

// Panel toggle (mobile)
window.togglePanel=()=>{
  document.getElementById('panel').classList.toggle('show');
  setTimeout(()=>map.invalidateSize(),250);
};

// Initial fit
const allPts=[...allData.flatMap(d=>d.coords),...pois.map(p=>p.coord)];
map.fitBounds(L.latLngBounds(allPts),{padding:[30,30],maxZoom:12});
</script>
</body>
</html>
