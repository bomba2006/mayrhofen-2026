<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mayrhofen 2026</title>
<meta name="description" content="Hiking research for Mayrhofen/Zillertal — 3 adults, Aug 31 – Sep 8, 2026. 12 hikes, 5 plans, interactive map, strudel directory.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#fafafa;color:#1a1a1a;padding-bottom:80px}
.header{background:linear-gradient(135deg,#e0793a,#c26a2e);color:#fff;padding:1.5rem 1rem 1.25rem;position:sticky;top:0;z-index:10}
.header h1{font-size:1.3rem;font-weight:700}
.header p{font-size:.72rem;opacity:.85;margin-top:.1rem}
.header-row{display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap}
.header-row .chip{background:rgba(255,255,255,.2);padding:.2rem .5rem;border-radius:99px;font-size:.6rem;font-weight:500}
.dl-btn{display:inline-flex;align-items:center;gap:.3rem;margin-top:.75rem;padding:.4rem .75rem;background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;font-size:.65rem;font-weight:600;cursor:pointer;text-decoration:none}
.dl-btn:hover{background:rgba(255,255,255,.35)}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:122px;z-index:9;overflow-x:auto}
.tab{padding:.55rem .8rem;font-size:.68rem;font-weight:600;color:#888;border:none;background:none;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#e0793a;border-bottom-color:#e0793a}
.content{padding:.6rem}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:.85rem;margin-bottom:.5rem;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem}
.card h3{font-size:.78rem;font-weight:700;color:#1a1a1a;line-height:1.3}
.card .meta{font-size:.65rem;color:#888;margin-top:.1rem}
.badge{font-size:.55rem;padding:2px 5px;border-radius:4px;font-weight:700;flex-shrink:0}
.badge.t1{background:#fff5ed;color:#e0793a}.badge.t2{background:#e8f0fa;color:#4a90d9}
.badge.st{background:#fef6ed;color:#d4851f}.badge.dv{background:#f0ebff;color:#8b5cf6}
.stats{display:flex;gap:.6rem;margin-top:.3rem;flex-wrap:wrap}
.stat{font-size:.62rem;color:#666}.stat strong{color:#1a1a1a;font-weight:600}
.hut{font-size:.6rem;color:#2e8b57;margin-top:.2rem}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.6rem}
.dash{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:.65rem;text-align:center}
.dash .val{font-size:1.1rem;font-weight:700;color:#1a1a1a}
.dash .lbl{font-size:.55rem;color:#999;text-transform:uppercase;letter-spacing:.02em;margin-top:.05rem}
.dash .val.good{color:#2e8b57}.dash .val.warn{color:#d4851f}.dash .val.bad{color:#d14233}
.plan-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:.7rem;margin-bottom:.4rem}
.plan-name{font-size:.75rem;font-weight:700;margin-bottom:.25rem}
.plan-days{display:flex;flex-direction:column;gap:.1rem}
.plan-day{display:flex;justify-content:space-between;align-items:center;font-size:.62rem;padding:.2rem .35rem;border-radius:4px}
.plan-day:nth-child(odd){background:#f8f8f8}
.plan-day .dname{color:#333;font-weight:500;flex:1}
.plan-day .dstat{color:#888;font-size:.58rem;text-align:right;margin-left:.4rem}
.plan-day.hl{background:#fff5ed}
.link-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem}
.elink{display:inline-flex;align-items:center;gap:.25rem;padding:.4rem .65rem;border-radius:7px;font-size:.62rem;font-weight:600;text-decoration:none;color:#fff}
.elink.warm{background:#e0793a}.elink.dark{background:#1a1a2e;color:#e0e0e0}
.elink.map{background:#4a90d9}.elink.nb{background:#2e8b57}
.sec-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:#999;font-weight:700;margin:.8rem 0 .3rem}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e8;display:flex;z-index:20}
.bottom-nav a{flex:1;text-align:center;padding:.5rem .2rem;font-size:.58rem;color:#888;text-decoration:none;font-weight:500}
.bottom-nav a.active{color:#e0793a}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:.5rem 1rem;border-radius:8px;font-size:.7rem;z-index:100;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <h1>Mayrhofen 2026</h1>
  <p>3 adults · Aug 31 – Sep 8 · Self-catering · ☕🥮 daily</p>
  <div class="header-row">
    <span class="chip">All lifts open</span><span class="chip">All huts open</span><span class="chip">No paragliding</span>
  </div>
  <button class="dl-btn" onclick="downloadZip()">📦 Download All Data (ZIP)</button>
</div>
<div class="toast" id="toast"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('dash',this)">Home</button>
  <button class="tab" onclick="switchTab('hikes',this)">Hikes</button>
  <button class="tab" onclick="switchTab('plans',this)">Plans</button>
  <button class="tab" onclick="switchTab('info',this)">Info</button>
</div>

<div class="content" id="content"></div>

<div class="bottom-nav">
  <a href="#" onclick="switchTab('dash',document.querySelector('.tab'))" class="active">🏠 Home</a>
  <a href="#" onclick="switchTab('hikes',document.querySelectorAll('.tab')[1])">🥾 Hikes</a>
  <a href="#" onclick="switchTab('plans',document.querySelectorAll('.tab')[2])">📋 Plans</a>
  <a href="#" onclick="switchTab('info',document.querySelectorAll('.tab')[3])">ℹ️ Info</a>
</div>

<script src="notes-data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const D = NOTES_DATA;

const hikes = D.hikes;
const drives = D.drives;

const plans = [
  {name:'Plan A — Balanced',hl:[],days:[['Sun 31','Penken Panorama','8.7km · 35m/km'],['Mon 1','Filzenkogel','7km · 50m/km'],['Tue 2','Stilluptal Full','15.3km · 21m/km'],['Wed 3','Wolfsklamm + High Road','3km + drive'],['Thu 4','Ahorn High Walk','8km · 50m/km'],['Fri 5','Berliner Hütte','18.3km · 47m/km'],['Sat 6','Hintertux Glacier','gondola'],['Sun 7','Krimml Waterfalls','4km'],['Mon 8','Departure','☕ Town café']]},
  {name:'Plan B — With Olpererhütte',hl:[4],days:[['Sun 31','Penken Panorama','8.7km · 35m/km'],['Mon 1','Filzenkogel','7km · 50m/km'],['Tue 2','Stilluptal (short)','7km · 61m/km'],['Wed 3','Wolfsklamm + High Road','3km + drive'],['Thu 4','Olpererhütte Full','13.8km · 63m/km'],['Fri 5','Ahorn High Walk','8km · 50m/km'],['Sat 6','Hintertux Glacier','gondola'],['Sun 7','Krimml Waterfalls','4km'],['Mon 8','Departure','☕ Town café']]},
  {name:'Plan C — Gorge Heavy',hl:[],days:[['Sun 31','Zemmbach + town','5km'],['Mon 1','Wolfsklamm Gorge','3km'],['Tue 2','Penken Panorama','8.7km · 35m/km'],['Wed 3','Stilluptal Full','15.3km · 21m/km'],['Thu 4','Ahorn High Walk','8km · 50m/km'],['Fri 5','Krimml Waterfalls','4km'],['Sat 6','Berliner Hütte','18.3km · 47m/km'],['Sun 7','Hintertux Glacier','gondola'],['Mon 8','Departure','☕ Town café']]},
  {name:'Plan D — Relaxed',hl:[],days:[['Sun 31','Arrival + town','Rest'],['Mon 1','Penken Panorama','8.7km · 35m/km'],['Tue 2','Filzenkogel','7km · 50m/km'],['Wed 3','Wolfsklamm + High Road','3km + drive'],['Thu 4','Stilluptal Full','15.3km · 21m/km'],['Fri 5','Ahorn High Walk','8km · 50m/km'],['Sat 6','Hintertux Glacier','gondola'],['Sun 7','Krimml Waterfalls','4km'],['Mon 8','Departure','☕ Town café']]},
  {name:'Plan E — Weather-Flexible',hl:[4],days:[['Sun 31','Penken Panorama','35m/km · any'],['Mon 1','Berliner Hütte','47m/km'],['Tue 2','Wolfsklamm','dry preferred'],['Wed 3','Ahorn High Walk','50m/km'],['Thu 4','Olpererhütte Full','63m/km'],['Fri 5','Zillertal High Road','clear preferred'],['Sat 6','Stilluptal Full','21m/km · rain OK'],['Sun 7','Krimml','any'],['Mon 8','Hintertux','ANY WEATHER']]},
];

function renderDash(){
  return `
    <div class="dash-grid">
      <div class="dash"><div class="val good">All Open</div><div class="lbl">Cable Cars</div></div>
      <div class="dash"><div class="val good">All Open</div><div class="lbl">Mountain Huts</div></div>
      <div class="dash"><div class="val warn">Dropping</div><div class="lbl">Crowds (Sep 1+)</div></div>
      <div class="dash"><div class="val bad">Skip</div><div class="lbl">Activcard</div></div>
      <div class="dash"><div class="val">12</div><div class="lbl">Hikes</div></div>
      <div class="dash"><div class="val">5</div><div class="lbl">Day Plans</div></div>
      <div class="dash"><div class="val">☕🥮</div><div class="lbl">Daily</div></div>
      <div class="dash"><div class="val">3</div><div class="lbl">Adults</div></div>
    </div>
    <div class="sec-title">Reports & Map</div>
    <div class="link-row">
      <a class="elink warm" href="mayrhofen-zillertal-2026-report.html">📊 Full Report</a>
      <a class="elink dark" href="mayrhofen-zillertal-2026-linear.html">🌙 Dark</a>
      <a class="elink map" href="mayrhofen-zillertal-2026-map.html">🗺️ Map</a>
      <a class="elink nb" href="mayrhofen-zillertal-2026-mobile.html">📱 Mobile</a>
    </div>
    <div class="sec-title">Weather</div>
    <div class="card"><div class="stats">
      <div class="stat">Town <strong>${D.weather.town}</strong></div>
      <div class="stat">Penken/Ahorn <strong>${D.weather.penken}</strong></div>
      <div class="stat">Olperer <strong>${D.weather.olperer}</strong></div>
      <div class="stat">Glacier <strong>${D.weather.glacier}</strong></div>
    </div><div class="meta" style="margin-top:.3rem">${D.weather.strategy}</div></div>
    <div class="sec-title">Accommodation</div>
    <div class="card"><h3>${D.accommodation.name}</h3><div class="meta">${D.accommodation.rating} · ${D.accommodation.features} · ${D.accommodation.price}</div></div>
    <div class="sec-title">Supermarkets</div>
    <div class="card"><div class="stats">
      ${Object.entries(D.supermarkets).map(([k,v])=>`<div class="stat">${k.toUpperCase()} <strong>${v}</strong></div>`).join('')}
    </div></div>
    <div class="sec-title">Event</div>
    <div class="card"><div class="meta">${D.event}</div></div>
  `;
}

function renderHikes(){
  let h='';
  [['T1','t1'],['T2','t2'],['Stretch','st']].forEach(([label,tier])=>{
    h+=`<div class="sec-title">🥾 ${label}</div>`;
    hikes.filter(r=>r.tier===label).forEach(r=>{
      h+=`<div class="card"><div class="card-row"><h3>${r.name}</h3><span class="badge ${tier}">${label==='Stretch'?'STR':label}</span></div>
      <div class="stats"><div class="stat">📏 <strong>${r.km}km</strong></div><div class="stat">📈 <strong>${r.gain}</strong></div><div class="stat">⚡ <strong>${r.mpk}m/km</strong></div><div class="stat">⏱ <strong>${r.time}</strong></div></div>
      <div class="meta">${r.desc}</div><div class="hut">☕🥮 ${r.hut}</div></div>`;
    });
  });
  h+=`<div class="sec-title">🚗 Drives</div>`;
  drives.forEach(d=>{
    h+=`<div class="card"><div class="card-row"><h3>${d.name}</h3><span class="badge dv">DRV</span></div><div class="meta">${d.desc}</div></div>`;
  });
  return h;
}

function renderPlans(){
  let h='';
  plans.forEach(p=>{
    h+=`<div class="plan-card"><div class="plan-name">${p.name}</div><div class="plan-days">`;
    p.days.forEach((d,i)=>{
      h+=`<div class="plan-day${p.hl.includes(i)?' hl':''}"><span class="dname"><strong>${d[0]}</strong> · ${d[1]}</span><span class="dstat">${d[2]}</span></div>`;
    });
    h+='</div></div>';
  });
  return h;
}

function renderInfo(){
  return `
    <div class="sec-title">Cable Cars (2026)</div>
    <div class="card"><div class="stats">
      ${Object.entries(D.cablecars).map(([k,v])=>`<div class="stat">${k} <strong>${v}</strong></div>`).join('')}
    </div></div>
    <div class="sec-title">Restaurants</div>
    ${D.restaurants.map(r=>`<div class="card"><div class="card-row"><h3>${r.name}</h3></div><div class="meta">${r.type} · ${r.rating} · ${r.note}</div></div>`).join('')}
    <div class="sec-title">☕🥮 Strudel Stops</div>
    ${D.strudel_stops.map(s=>`<div class="card"><div class="card-row"><h3>${s.hike}</h3></div><div class="hut">${s.stop}</div></div>`).join('')}
    <div class="sec-title">Activcard</div>
    <div class="card"><h3>6-day: ${D.activcard['6day_adult']}/adult</h3><div class="meta">${D.activcard.verdict}</div></div>
    <div class="sec-title">Salzburg Reference (m/km)</div>
    <div class="card"><div class="stats">
      ${D.salzburg_ref.map(r=>`<div class="stat">${r.day}: ${r.hike} <strong>${r.mpk}m/km</strong> (${r.gain}/${r.km}km)</div>`).join('')}
    </div></div>
  `;
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bottom-nav a').forEach((a,i)=>{
    a.classList.toggle('active',(tab==='dash'&&i===0)||(tab==='hikes'&&i===1)||(tab==='plans'&&i===2)||(tab==='info'&&i===3));
  });
  btn.classList.add('active');
  const content=document.getElementById('content');
  if(tab==='dash')content.innerHTML=renderDash();
  else if(tab==='hikes')content.innerHTML=renderHikes();
  else if(tab==='plans')content.innerHTML=renderPlans();
  else content.innerHTML=renderInfo();
}

switchTab('dash',document.querySelector('.tab'));

// DOWNLOAD ZIP
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

async function downloadZip(){
  toast('Building ZIP...');
  const zip=new JSZip();
  zip.file('README.txt',`Mayrhofen / Zillertal 2026 — Research Export\n==============================================\n3 adults · Aug 31 – Sep 8, 2026 · Self-catering\nExported: ${new Date().toISOString().split('T')[0]}\n\nThis ZIP contains all research notes, hike data, and plans.\nSee the index.html, report.html, and map.html for interactive views.\n`);
  zip.file('notes-data.json',JSON.stringify(D,null,2));
  // Add CSV of hikes
  let csv='Name,Tier,km,Gain,m/km,Time,Strudel Stop,Description\n';
  D.hikes.forEach(h=>{csv+=`"${h.name}","${h.tier}","${h.km}","${h.gain}","${h.mpk}","${h.time}","${h.hut}","${h.desc}"\n`});
  zip.file('hikes.csv',csv);
  // Add markdown summary
  let md='# Mayrhofen 2026 — Research Summary\n\n';
  md+='## Weather\n'+Object.entries(D.weather).map(([k,v])=>`- **${k}:** ${v}`).join('\n')+'\n\n';
  md+='## Hikes\n\n' + D.hikes.map(h=>`### ${h.name} (${h.tier})\n- ${h.km}km · ${h.gain} · ${h.mpk}m/km · ${h.time}\n- Strudel: ${h.hut}\n- ${h.desc}\n`).join('\n');
  md+='\n## Cable Cars\n'+Object.entries(D.cablecars).map(([k,v])=>`- ${k}: ${v}`).join('\n')+'\n';
  md+='\n## Accommodation\n- '+D.accommodation.name+' · '+D.accommodation.rating+'\n- '+D.accommodation.features+'\n- '+D.accommodation.price+'\n';
  zip.file('summary.md',md);
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mayrhofen-2026-research.zip';a.click();
  URL.revokeObjectURL(url);
  toast('✅ Downloaded!');
}
</script>
</body>
</html>
